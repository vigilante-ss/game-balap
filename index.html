<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Main Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
            --dark-bg: #0b0c10;
            --glass-bg: rgba(11, 12, 16, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Simulasi background game (ganti dengan canvas WebGL-mu nanti) */
        #game-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
            z-index: 1;
        }

        /* Overlay Menu Utama */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .game-title {
            font-family: 'Black Ops One', cursive;
            font-size: 5rem;
            letter-spacing: 5px;
            margin-bottom: 50px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
            animation: pulse-glow 2s infinite alternate;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
        }

        .btn {
            position: relative;
            background: transparent;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 15px 30px;
            border: 2px solid var(--neon-blue);
            cursor: pointer;
            text-transform: uppercase;
            overflow: hidden;
            transition: 0.3s ease;
            box-shadow: inset 0 0 0 var(--neon-blue), 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.4), transparent);
            transition: 0.5s ease;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-blue);
            text-shadow: none;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-garage {
            border-color: var(--neon-pink);
            box-shadow: inset 0 0 0 var(--neon-pink), 0 0 10px rgba(255, 0, 234, 0.2);
        }

        .btn-garage::before {
            background: linear-gradient(90deg, transparent, rgba(255, 0, 234, 0.4), transparent);
        }

        .btn-garage:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .version-tag {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); transform: scale(1); }
            100% { text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue), 0 0 60px var(--neon-blue); transform: scale(1.02); }
        }

        /* Notifikasi sistem */
        #sys-notification {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-blue);
            color: var(--dark-bg);
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 100;
        }

    </style>
</head>
<body>

    <div id="game-canvas-container">
        </div>

    <div id="sys-notification">System message here</div>

    <div id="main-menu">
        <div class="game-title">DRIVE MAD</div>
        
        <div class="menu-buttons">
            <button class="btn btn-play" id="btn-play">PLAY GAME</button>
            <button class="btn btn-garage" id="btn-garage">GARAGE</button>
            <button class="btn" id="btn-fullscreen">FULLSCREEN</button>
        </div>

        <div class="version-tag">SYSTEM V.1.0 - VIGI AI</div>
    </div>

    <script>
        // Deklarasi elemen
        const mainMenu = document.getElementById('main-menu');
        const btnPlay = document.getElementById('btn-play');
        const btnGarage = document.getElementById('btn-garage');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const sysNotif = document.getElementById('sys-notification');

        // Fungsi Notifikasi ala Jarvis
        function showNotification(message) {
            sysNotif.textContent = message;
            sysNotif.style.opacity = '1';
            sysNotif.style.visibility = 'visible';
            
            setTimeout(() => {
                sysNotif.style.opacity = '0';
                sysNotif.style.visibility = 'hidden';
            }, 3000);
        }

        // Logika Tombol PLAY
        btnPlay.addEventListener('click', () => {
            showNotification('Engine started. Stand by...');
            
            // Efek transisi menghilang
            mainMenu.style.opacity = '0';
            setTimeout(() => {
                mainMenu.style.visibility = 'hidden';
                console.log("Vigi: Mengarahkan ke arena operasional.");
                // VIGI PROTOCOL: Alihkan ke arena
                window.location.href = 'game.html';
            }, 500);
        });
		
        // Logika Tombol GARAGE
        btnGarage.addEventListener('click', () => {
            showNotification('Accessing Garage Protocol...');
            // Mengarahkan ke file garasi yang sudah kita buat sebelumnya
            setTimeout(() => {
                window.location.href = 'garage.html'; // Pastikan nama file sesuai dengan yang kamu simpan
            }, 800);
        });

        // Logika Tombol FULLSCREEN
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    btnFullscreen.textContent = 'EXIT FULLSCREEN';
                    showNotification('Fullscreen mode engaged.');
                }).catch((err) => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen().then(() => {
                        btnFullscreen.textContent = 'FULLSCREEN';
                        showNotification('Fullscreen mode disengaged.');
                    });
                }
            }
        });

        // Opsional: Tekan ESC untuk memunculkan menu kembali jika sedang di dalam game
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && mainMenu.style.visibility === 'hidden') {
                mainMenu.style.visibility = 'visible';
                mainMenu.style.opacity = '1';
                showNotification('Menu accessed.');
            }
        });
    </script>
</body>
</html>
