<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Makassar Street Racer - T.S.S</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; background: #0a0a1a; }
        
        /* ADSTERRA BANNER CONTAINER - Safe Zone */
        #ad-banner-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 320px; height: 50px; z-index: 1000; background: rgba(0,0,0,0.8); border: 1px solid #ffaa00; border-top: none; border-radius: 0 0 10px 10px; display: flex; align-items: center; justify-content: center; color: #ffaa00; font-size: 12px; }

        /* HUD Styles */
        #info { position: absolute; top: 60px; left: 10px; right: 10px; color: white; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 20px; border: 1px solid #ffaa00; z-index: 10; display: flex; justify-content: space-around; flex-wrap: wrap; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .dashboard-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .label { font-size: 0.7em; opacity: 0.8; }
        .value { font-size: 1.4em; font-weight: bold; color: #ffaa00; }
        #speed { color: #66ff99; }
        
        #controls-hint { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 15px; font-size: 14px; z-index: 20; }
        #touch-controls { position: absolute; bottom: 30px; right: 30px; display: none; gap: 20px; z-index: 30; }
        .touch-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(30,30,30,0.9); border: 2px solid #ffaa00; color: #ffaa00; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .touch-btn:active { background: #ffaa00; color: black; }
        
        /* Loading Screen */
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c10; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00f3ff; font-family: 'Courier New', Courier, monospace; }
    </style>
    <!-- Import Maps agar ES Modules Three.js bekerja sempurna di Vercel/Netlify -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>
</head>
<body>
    <div id="ad-banner-top">
        <!-- Paste Script Tag Banner Adsterra Anda di sini -->
        [ ADSTERRA BANNER 320x50 ]
    </div>

    <div id="loading-screen">
        <h2>VIGI SYSTEM: MENGAMBIL DATA KOTA...</h2>
        <p>Memuat Makassar Map.json</p>
    </div>

    <div id="info">
        <div class="dashboard-item"><span class="label">SPEED</span><span class="value" id="speed">0</span></div>
        <div class="dashboard-item"><span class="label">STATUS</span><span class="value" style="font-size: 1em;">OPERASIONAL</span></div>
    </div>
    
    <div id="controls-hint">WASD / A=KIRI, D=KANAN</div>
    
    <div id="touch-controls">
        <div class="touch-btn" id="touch-left">←</div>
        <div class="touch-btn" id="touch-up">↑</div>
        <div class="touch-btn" id="touch-down">↓</div>
        <div class="touch-btn" id="touch-right">→</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { MapBuilder } from './MapBuilder.js';

        // Pengecekan Perangkat & Tipe Mobil dari Garasi
        const isMobile = /Android|webOS|iPhone|iPad/i.test(navigator.userAgent);
        if(isMobile) document.getElementById('touch-controls').style.display = 'flex';
        
        const selectedCarId = localStorage.getItem('selectedCar') || 'car_01';
        console.log(`Vigi: Kendaraan operasional T.S.S dikerahkan (${selectedCarId})`);

        // Setup Three.js
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a); 
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x222244);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffddaa, 0.8);
        dirLight.position.set(10, 30, 20);
        scene.add(dirLight);

        // Ground Dasar
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Memanggil MapBuilder
        const cityBuilder = new MapBuilder(scene);
        
        // Load Peta dan Sembunyikan Loading Screen
        cityBuilder.loadMapData('./map.json').then(() => {
            document.getElementById('loading-screen').style.display = 'none';
        });

        // Player Vehicle
        const carGroup = new THREE.Group();
        scene.add(carGroup);
        
        // Membuat bentuk kendaraan berdasarkan ID dari Garasi
        if (selectedCarId === 'car_02') {
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            body.position.y = 0.5; carGroup.add(body);
        } else {
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            body.position.y = 0.7; carGroup.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.8, 2), new THREE.MeshStandardMaterial({ color: 0x050505 }));
            cabin.position.set(0, 1.2, -0.3); carGroup.add(cabin);
        }

        // Posisi Awal di Warkop 460 (Sesuai map.json)
        carGroup.position.set(25, 0.2, 15);
        let velocity = new THREE.Vector3();

        // Input Handling
        const keys = { w:false, a:false, s:false, d:false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // Touch Control Binding
        const tUp = document.getElementById('touch-up'), tDown = document.getElementById('touch-down'), tLeft = document.getElementById('touch-left'), tRight = document.getElementById('touch-right');
        if(tUp) {
            tUp.onpointerdown = () => keys.w=true; tUp.onpointerup = () => keys.w=false;
            tDown.onpointerdown = () => keys.s=true; tDown.onpointerup = () => keys.s=false;
            tLeft.onpointerdown = () => keys.a=true; tLeft.onpointerup = () => keys.a=false;
            tRight.onpointerdown = () => keys.d=true; tRight.onpointerup = () => keys.d=false;
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            let accel = 0, steer = 0;
            if (keys.w) accel += 1; if (keys.s) accel -= 1;
            if (keys.a) steer -= 1; if (keys.d) steer += 1;
            
            velocity.z += accel * 0.03;
            velocity.z *= 0.95; // Friction
            if (velocity.z > 0.8) velocity.z = 0.8;
            if (velocity.z < -0.3) velocity.z = -0.3;
            
            if (steer !== 0 && Math.abs(velocity.z) > 0.01) {
                carGroup.rotation.y += steer * 0.04 * (velocity.z > 0 ? 1 : -1);
            }
            
            carGroup.translateZ(velocity.z);

            // Update UI Speed
            document.getElementById('speed').innerText = Math.floor(Math.abs(velocity.z) * 100);

            // Camera follow
            const carDir = new THREE.Vector3(0, 0, 1).applyQuaternion(carGroup.quaternion);
            const camTarget = carGroup.position.clone().sub(carDir.multiplyScalar(12)).add(new THREE.Vector3(0, 6, 0));
            camera.position.lerp(camTarget, 0.1);
            camera.lookAt(carGroup.position);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
